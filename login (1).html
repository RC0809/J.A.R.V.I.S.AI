<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S - Login</title>
    <link rel="stylesheet" href="login-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="scanner-line"></div>
            <div class="login-content">
                <div class="logo">J.A.R.V.I.S</div>
                <h1>Welcome Back</h1>
                <p class="subtitle">Access your intelligent system</p>
                <form id="login-form">
                    <div class="form-group">
                        <div class="input-container">
                            <input type="text" id="username" required>
                            <label for="username">Username</label>
                            <div class="input-border"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="input-container">
                            <input type="password" id="password" required>
                            <label for="password">Password</label>
                            <div class="input-border"></div>
                        </div>
                    </div>
                    <button type="submit" class="login-btn">
                        <span>INITIALIZE LOGIN</span>
                        <div class="btn-particles">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </button>
                </form>
                <div class="alternative-login">
                    <p>Or continue with</p>
                    <div class="login-options">
                        <button class="login-option phone">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                            Continue with Phone
                        </button>
                        <button class="login-option google">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                            Continue with Google
                        </button>
                        <button class="login-option microsoft">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2" ry="2"></rect><line x1="12" y1="2" x2="12" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line></svg>
                            Continue with Microsoft
                        </button>
                        <button class="login-option apple">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a9 9 0 0 1 9 9c0 3.5-2 6.5-5 8l-4 4-4-4c-3-1.5-5-4.5-5-8a9 9 0 0 1 9-9z"></path></svg>
                            Continue with Apple
                        </button>
                    </div>
                </div>
                <div class="additional-options">
                    <a href="#" class="forgot-password">Reset Access Codes</a>
                    <a href="#" class="signup-link">Don't have an account? Sign up</a>
                    <a href="index.html" class="back-home">Return to Main Interface</a>
                </div>
            </div>
            <div class="hologram-effect"></div>
        </div>
    </div>
    <script src="login-script.js"></script>
</body>
</html>
